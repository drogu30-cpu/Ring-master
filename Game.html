<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Drop - Game</title>

<style>
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
    font-family: Arial;
  }

  canvas {
    display: block;
  }

  #startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    z-index: 10;
    flex-direction: column;
    gap: 20px;
  }

  #gameOverScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    color: white;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    z-index: 11;
    flex-direction: column;
    gap: 20px;
  }

  button {
    padding: 10px 20px;
    font-size: 20px;
    background: cyan;
    color: black;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
  }

  button:hover {
    background: #00ffff;
  }
</style>
</head>

<body>

<div id="startScreen">
  <div>TAP DROP - THE GAME</div>
  <button onclick="startGame()">TAP TO START</button>
</div>

<div id="gameOverScreen">
  <div id="finalScore">Final Score: 0</div>
  <button onclick="location.reload()">PLAY AGAIN</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let speed = 2;
let blocks = [];
let started = false;
let gameOver = false;

// 🎧 Audio - Using your actual audio files
const music = new Audio("mixkit-sparta-370.mp3");
music.loop = true;
music.volume = 0.3;

function playWin() {
  try {
    new Audio("Mind-Bender-2.ogg").play().catch(err => console.log("Win sound error:", err));
  } catch(e) {
    console.log("Could not play win sound");
  }
}

function playError() {
  const a = new (window.AudioContext || window.webkitAudioContext)();
  const o = a.createOscillator();
  const g = a.createGain();

  o.type = "triangle";
  o.frequency.setValueAtTime(200, a.currentTime);
  o.frequency.exponentialRampToValueAtTime(90, a.currentTime + 0.2);

  g.gain.setValueAtTime(0.3, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.25);

  o.connect(g);
  g.connect(a.destination);
  o.start();
  o.stop(a.currentTime + 0.25);
}

// 🎮 Start Game
function startGame() {
  if (started) return;
  started = true;
  gameOver = false;

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameOverScreen").style.display = "none";

  music.play().catch(()=>{});
}

// 🎯 Blocks
function spawnBlock() {
  if (!started || gameOver) return;
  blocks.push({
    x: Math.random() * (canvas.width - 30),
    y: -30,
    size: 30
  });
}

canvas.addEventListener("touchstart", handleTap);
canvas.addEventListener("click", handleTap);

function handleTap(e) {
  if (!started || gameOver) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;

  let hit = false;

  blocks.forEach((b, i) => {
    if (x > b.x && x < b.x + b.size && y > b.y && y < b.y + b.size) {
      blocks.splice(i, 1);
      score++;
      hit = true;
    }
  });

  if (!hit) playError();

  // ⚡ Intensity system - gets harder as you score
  speed = 2 + score * 0.15;
  music.playbackRate = 1 + score * 0.02;

  // 🏆 Win condition
  if (score === 15) {
    playWin();
    endGame();
  }
}

function endGame() {
  gameOver = true;
  music.pause();
  document.getElementById("finalScore").textContent = "Final Score: " + score;
  document.getElementById("gameOverScreen").style.display = "flex";
}

// 🔄 Game Loop
function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "cyan";

  blocks.forEach((b) => {
    b.y += speed;
    ctx.fillRect(b.x, b.y, b.size, b.size);
  });

  // Remove blocks that went off screen and check for game over
  blocks = blocks.filter(b => b.y < canvas.height);

  // Display score
  ctx.fillStyle = "white";
  ctx.font = "24px Arial";
  ctx.fillText("Score: " + score, 20, 40);

  // Check if any block reached the bottom (lose condition)
  if (started && !gameOver) {
    blocks.forEach(b => {
      if (b.y > canvas.height) {
        endGame();
      }
    });
  }

  requestAnimationFrame(update);
}

// Start spawning blocks
setInterval(spawnBlock, 900);
update();

// Handle window resize
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
